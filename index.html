<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Twitterです</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      color: #111;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        "Hiragino Sans",
        "Yu Gothic",
        sans-serif;
      overflow: hidden;
    }

    /* 背景のうっすらグラデーション */
    .bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, #f2f2f2, transparent 40%),
        radial-gradient(circle at 80% 70%, #f5f5f5, transparent 40%);
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 900px;
    }

    h1 {
      margin: 0;
      font-size: clamp(38px, 7vw, 72px);
      line-height: 1.25;
      letter-spacing: -0.03em;
      animation: rise 1s ease forwards;
      opacity: 0;
    }

    .sub {
      margin-top: 20px;
      font-size: 15px;
      color: #777;
      animation: fadeIn 1.6s ease forwards;
      opacity: 0;
    }

    .hashtag {
    color: #00a6e6;
    text-decoration: none;
    font-weight: 500;
    }

    .hashtag:hover {
    text-decoration: underline;
    opacity: 0.8;
    }
    
    .twitter {
    color: #00a6e6;
    }

    /* アニメーション */
    @keyframes rise {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    /* ダークモード対応 */
    @media (prefers-color-scheme: dark) {
      body {
        background: #0f0f0f;
        color: #f5f5f5;
      }

      .bg {
        background:
          radial-gradient(circle at 20% 30%, #1a1a1a, transparent 40%),
          radial-gradient(circle at 80% 70%, #1c1c1c, transparent 40%);
      }

      .sub {
        color: #999;
      }

      .footer {
        color: #555;
      }
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <main>

    <h1>
      私は、これからもXのことを<br />
      <span class="twitter">Twitter</span>と呼び続けます。
    </h1>

        <div class="sub">
    <a
        href="https://twitter.com/intent/tweet?text=%23ForeverTwitter"
        target="_blank"
        rel="noopener noreferrer"
        class="hashtag"
    >
        #ForeverTwitter
    </a>
    </div>
  </main>
</body>
</html>
